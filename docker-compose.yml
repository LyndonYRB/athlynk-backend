services:
  postgres:
    image: postgres:16
    container_name: fitfriends-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitfriends
      POSTGRES_PASSWORD: fitfriends_pw
      POSTGRES_DB: fitfriends
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
